<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Shopping List</title>
</head>
<body>
    <div class="container">
        <h1 class="text-center">Shopping List</h1>

        <form class="shopping-form border rounded p-3 mb-3">
            <div class="input-group">
                <input type="text" id="item_name" class="form-control item_name" placeholder="Eleman Ekle">
                <button type="submit" class="btn btn-primary" ><i class="bi bi-plus"></i></button>
            </div>
        </form>

        <div class="filter-buttons border rounded p-3 mb-3">
            <button item-filter="all" class="btn btn-primary">All</button>
            <button item-filter="incomplete" class="btn btn-secondary">Incomplete</button>
            <button item-filter="completed" class="btn btn-secondary">Completed</button>
        </div>

        <ul class="shopping-list list-unstyled">
            
        </ul>
    </div>
    <script src="script.js"></script>
    <!-- <script src="scriptOnlyVanilla.js"></script> -->
</body>
</html>
